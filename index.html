<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Distance PWA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div id="app">
        <div id="map-container">
            <div id="map"></div>

            <!-- Top floating overlay for hole selection -->
            <div id="top-bar">
                <select id="hole-selector">
                    <option value="7">Hole 7</option>
                    <!-- Additional holes would go here -->
                </select>
                <div id="gps-status" class="status-indicator">
                    <span class="dot disconnected"></span> GPS: Waiting...
                </div>
            </div>
        </div>

        <div id="distance-panel">
            <div class="distance-row">
                <div class="target-label green">Green Front</div>
                <div class="target-value" id="dist-green-front">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label green">Green Back</div>
                <div class="target-value" id="dist-green-back">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label hazard">Hazard Front</div>
                <div class="target-value" id="dist-hazard-front">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label hazard">Hazard Back</div>
                <div class="target-value" id="dist-hazard-back">-- yd</div>
            </div>

            <button id="btn-start" class="btn-primary">Start Location Tracking</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
    <script src="app.js" type="module"></script>
</body>

</html>

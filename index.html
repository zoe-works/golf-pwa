<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Distance PWA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Golf Dist">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e88e5'/><circle cx='50' cy='50' r='30' fill='white'/></svg>">
</head>

<body>
    <div id="app">
        <div id="map-container">
            <div id="map"></div>

            <!-- Top floating overlay for course and hole selection -->
            <div id="top-bar">
                <select id="course-selector">
                    <option value="data/prime_city.json">Prime City & Golf</option>
                    <option value="data/bangsai.json">Bangsai Country Club (27 Holes)</option>
                </select>
                <select id="hole-selector">
                    <!-- Options will be populated dynamically -->
                </select>
                <div id="gps-status" class="status-indicator">
                    <span class="dot disconnected"></span> GPS: Waiting...
                </div>
            </div>

            <!-- Floating button to center on user -->
            <button id="btn-recenter" class="fab">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor"
                        d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,10A2,2 0 0,0 10,12A2,2 0 0,0 12,14A2,2 0 0,0 14,12A2,2 0 0,0 12,10M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4Z" />
                </svg>
            </button>

            <!-- Edit Mode Controls -->
            <div id="edit-controls">
                <button id="btn-edit-toggle" class="edit-btn">Edit Map</button>
                <button id="btn-export-data" class="edit-btn secondary" style="display: none;">Share Data</button>

                <!-- Hidden file input for importing -->
                <input type="file" id="import-file-input" accept=".json" style="display: none;">
                <button id="btn-import-data" class="edit-btn secondary" style="display: none;">Import Data</button>

                <button id="btn-reset-data" class="edit-btn danger" style="display: none;">Reset</button>
            </div>
        </div>

        <div id="distance-panel">
            <div class="distance-row priority">
                <div class="target-label green">Green Center</div>
                <div class="target-value" id="dist-green-center">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label green">Green Front</div>
                <div class="target-value" id="dist-green-front">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label green">Green Back</div>
                <div class="target-value" id="dist-green-back">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label hazard">Hazard Front</div>
                <div class="target-value" id="dist-hazard-front">-- yd</div>
            </div>
            <div class="distance-row">
                <div class="target-label hazard">Hazard Back</div>
                <div class="target-value" id="dist-hazard-back">-- yd</div>
            </div>

            <button id="btn-start" class="btn-primary">Start Location Tracking</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
    <script src="app.js" type="module"></script>
</body>

</html>

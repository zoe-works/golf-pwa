<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Distance PWA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Golf Dist">
    <link rel="apple-touch-icon" href="icon.png">
</head>

<body>
    <div id="app">
        <!-- Main Play View -->
        <div id="view-play" class="view-section active">
            <div id="map-container">
                <div id="map"></div>

                <!-- Top floating overlay for course and hole selection -->
                <div id="top-bar">
                    <select id="course-selector">
                        <option value="data/prime_city.json">Prime City & Golf</option>
                        <option value="data/bangsai.json">Bangsai Country Club (27 Holes)</option>
                    </select>
                    <select id="hole-selector">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>

                <!-- Floating button to center on user -->
                <button id="btn-recenter" class="fab btn-recenter">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor"
                            d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
                    </svg>
                </button>

                <!-- Floating button to Record Shot (Memo) -->
                <button id="btn-record-shot" class="fab btn-record-shot" style="display: none;">
                    📝
                </button>

                <!-- Edit Mode Controls -->
                <div id="edit-controls">
                    <button id="btn-edit-toggle" class="edit-btn">Edit Map</button>
                    <button id="btn-export-data" class="edit-btn secondary" style="display: none;">Share Data</button>

                    <!-- Hidden file input for importing -->
                    <input type="file" id="import-file-input" accept=".json" style="display: none;">
                    <button id="btn-import-data" class="edit-btn secondary" style="display: none;">Import Data</button>

                    <button id="btn-reset-data" class="edit-btn danger" style="display: none;">Reset</button>
                </div>

                <div id="top-indicators">
                    <div id="gps-status" class="status-indicator">
                        <span class="dot disconnected"></span> GPS: Waiting...
                    </div>
                    <div id="hole-status" class="status-indicator" style="display: none;">
                        Hole <span id="ui-current-hole">1</span> &nbsp;|&nbsp; Par <span id="ui-current-par">4</span>
                    </div>
                </div>
            </div>

            <div id="distance-panel">
                <div class="distance-row priority">
                    <div class="target-label green">Green Center</div>
                    <div class="target-value" id="dist-green-center">-- yd</div>
                </div>
                <div class="distance-row hidden">
                    <div class="target-label green">Green Front</div>
                    <div class="target-value" id="dist-green-front">-- yd</div>
                </div>
                <div class="distance-row hidden">
                    <div class="target-label green">Green Back</div>
                    <div class="target-value" id="dist-green-back">-- yd</div>
                </div>
                <div class="distance-row hidden">
                    <div class="target-label hazard">Hazard Front</div>
                    <div class="target-value" id="dist-hazard-front">-- yd</div>
                </div>
                <div class="distance-row hidden">
                    <div class="target-label hazard">Hazard Back</div>
                    <div class="target-value" id="dist-hazard-back">-- yd</div>
                </div>

                <div class="score-summary-bar" id="score-summary-bar"
                    style="display: none; justify-content: space-between; gap: 10px;">
                    <button id="btn-finish-hole" class="btn-secondary btn-small" style="flex: 1;">Hole out</button>
                    <button id="btn-round-finish" class="btn-primary btn-small" style="flex: 1;">Round finish</button>
                </div>

            </div> <!-- End distance-panel -->
        </div> <!-- End view-play -->

        <!-- History View -->
        <div id="view-history" class="view-section hidden">
            <div class="view-header">
                <h2>Past Scores</h2>
            </div>
            <div class="history-summary stat-box-row" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div class="stat-box" style="flex: 1;">
                    <span class="stat-num" id="stat-best-score" style="color: #4CAF50;">--</span>
                    <span class="stat-label">Best (18H)</span>
                </div>
                <div class="stat-box" style="flex: 1;">
                    <span class="stat-num" id="stat-avg-score" style="color: #2196F3;">--</span>
                    <span class="stat-label">Avg (Last 3)</span>
                </div>
            </div>
            <ul id="history-list" class="history-list">
                <!-- Populated by JS -->
            </ul>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="view-section hidden">
            <div class="view-header">
                <h2>Settings</h2>
            </div>

            <div class="settings-group">
                <h3>My Clubs</h3>
                <p class="subtitle">Select the clubs you carry in your bag.</p>
                <div id="settings-club-grid" class="club-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <!-- Populated by JS -->
                </div>
                <button id="btn-save-settings" class="btn-primary" style="margin-top: 20px;">Save Settings</button>
            </div>
        </div>

        <!-- Global Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-btn active" data-target="view-play">
                <span class="nav-icon">🏌️</span>
                <span class="nav-text">Play</span>
            </button>
            <button class="nav-btn" data-target="view-history">
                <span class="nav-icon">📋</span>
                <span class="nav-text">History</span>
            </button>
            <button class="nav-btn" data-target="view-settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">Settings</span>
            </button>
        </nav>

        <!-- Shot Recording Modal -->
        <div id="club-modal" class="modal hidden">
            <div class="modal-content text-center">
                <div class="modal-header" style="margin-bottom: 5px;">
                    <button id="btn-shot-prev" class="icon-btn" style="visibility: hidden;">&larr;</button>
                    <h3 style="margin: 0; flex: 1;"><strong>Record shot <span id="shot-number-display">1</span></strong>
                    </h3>
                    <button id="btn-shot-next" class="icon-btn" style="visibility: hidden;">&rarr;</button>
                </div>
                <p class="subtitle" style="margin-top: 0;">Select club</p>

                <div class="club-grid" id="club-grid-container">
                    <button class="club-btn" data-club="1W">1W</button>
                    <button class="club-btn" data-club="3W">3W</button>
                    <button class="club-btn" data-club="5W">5W</button>
                    <button class="club-btn" data-club="4U">4U</button>
                    <button class="club-btn" data-club="5I">5I</button>
                    <button class="club-btn" data-club="6I">6I</button>
                    <button class="club-btn" data-club="7I">7I</button>
                    <button class="club-btn" data-club="8I">8I</button>
                    <button class="club-btn" data-club="9I">9I</button>
                    <button class="club-btn" data-club="PW">PW</button>
                    <button class="club-btn" data-club="AW">AW</button>
                    <button class="club-btn" data-club="SW">SW</button>
                    <button class="club-btn" data-club="PT">PT</button>
                </div>
                <div class="club-grid" style="margin-top: 8px; grid-template-columns: repeat(2, 1fr);">
                    <button class="penalty-btn danger" data-penalty="OB">OB</button>
                    <button class="penalty-btn danger" data-penalty="Pena">Pena</button>
                </div>

                <div class="input-group mt-15" style="border-bottom: none; padding-bottom: 5px;">
                    <label>Shot-Self-Scoring</label>
                    <div class="stepper">
                        <button id="btn-shot-score-minus" class="stepper-btn">-</button>
                        <span id="shot-score-val" class="stepper-val" style="width: 50px;">50</span>
                        <button id="btn-shot-score-plus" class="stepper-btn">+</button>
                    </div>
                </div>

                <div class="input-group" style="border-bottom: none;">
                    <textarea id="shot-memo-input" rows="2" placeholder="Shot memo..."></textarea>
                </div>

                <div class="modal-actions mt-15">
                    <button id="btn-save-shot" class="btn-primary">Save</button>
                    <button id="btn-cancel-shot" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Hole Completion Modal -->
        <div id="hole-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Hole <span id="hole-modal-num">1</span> Result</h3>

                <div class="input-group">
                    <label>Putts</label>
                    <div class="stepper">
                        <button id="btn-putt-minus" class="stepper-btn">-</button>
                        <span id="putt-count" class="stepper-val">2</span>
                        <button id="btn-putt-plus" class="stepper-btn">+</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Pena</label>
                    <div class="stepper">
                        <button id="btn-pen-minus" class="stepper-btn">-</button>
                        <span id="pen-count" class="stepper-val">0</span>
                        <button id="btn-pen-plus" class="stepper-btn">+</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Memo / Evaluation</label>
                    <textarea id="hole-memo" rows="2" placeholder="Great drive, poor putting..."></textarea>
                </div>

                <div class="modal-actions">
                    <button id="btn-save-hole" class="btn-primary">Save & Next</button>
                    <button id="btn-cancel-hole" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Full Scorecard / Export Modal -->
        <div id="scorecard-modal" class="modal hidden">
            <div class="modal-content full-height">
                <div class="modal-header">
                    <h3>Scorecard</h3>
                    <button id="btn-close-scorecard" class="close-btn">&times;</button>
                </div>
                <div id="scorecard-body" class="scorecard-scrollable">
                    <!-- Dynamic table goes here -->
                </div>
                <div class="modal-actions" style="display: flex; gap: 10px;">
                    <button id="btn-save-round" class="btn-primary" style="flex: 2;">Save Results</button>
                    <button id="btn-export-ai" class="btn-secondary"
                        style="flex: 1; padding: 12px 5px; font-size: 13px;">Copy AI Text</button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
    <script type="module" src="distance.js"></script>
    <script type="module" src="geolocation.js"></script>
    <script type="module" src="scorecard.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
